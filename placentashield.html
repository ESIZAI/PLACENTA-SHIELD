<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Placenta Shield - LNP 4K Alta Fidelidad Interactiva</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden; font-family: sans-serif;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
             renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true; sortObjects: true;">
        
        <a-marker preset="hiro">
            
            <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
            <a-light type="directional" position="2 4 2" intensity="2" color="#f2f1ec"></a-light>
            <a-light type="directional" position="-2 1 -2" intensity="1" color="#dcfd8b"></a-light>

            <a-entity position="0 0.5 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear">
                
                <a-sphere radius="0.8" segments-width="64" segments-height="64" color="#f2f1ec" opacity="0.25" 
                          material="transparent: true; roughness: 0.1; metalness: 0.3;"></a-sphere>
                <a-sphere radius="0.79" segments-width="32" segments-height="32" color="#003366" opacity="0.3" 
                          material="transparent: true; wireframe: true;"></a-sphere>

                <a-entity animation="property: rotation; to: 360 360 360; loop: true; dur: 12000; easing: linear">
                    <a-torus-knot radius="0.22" tube="0.06" p="3" q="5" segments-tubular="128" segments-radial="32" 
                                  color="#003366" material="roughness: 0.4; metalness: 0.6;"></a-torus-knot>
                    <a-sphere radius="0.12" segments-width="32" segments-height="32" color="#dcfd8b" 
                              material="roughness: 0.2; metalness: 0.1;"></a-sphere>
                </a-entity>

                <a-entity position="0 0.8 0">
                    <a-cylinder radius="0.015" height="0.3" segments-radial="32" color="#003366" position="0 0.15 0"></a-cylinder>
                    <a-sphere radius="0.08" segments-width="32" segments-height="32" color="#dcfd8b" position="0 0.3 0"></a-sphere>
                </a-entity>
                <a-entity position="0 -0.8 0" rotation="0 0 180">
                    <a-cylinder radius="0.015" height="0.3" segments-radial="32" color="#003366" position="0 0.15 0"></a-cylinder>
                    <a-sphere radius="0.08" segments-width="32" segments-height="32" color="#dcfd8b" position="0 0.3 0"></a-sphere>
                </a-entity>
                <a-entity position="0.8 0 0" rotation="0 0 -90">
                    <a-cylinder radius="0.015" height="0.3" segments-radial="32" color="#003366" position="0 0.15 0"></a-cylinder>
                    <a-sphere radius="0.08" segments-width="32" segments-height="32" color="#dcfd8b" position="0 0.3 0"></a-sphere>
                </a-entity>
                <a-entity position="-0.8 0 0" rotation="0 0 90">
                    <a-cylinder radius="0.015" height="0.3" segments-radial="32" color="#003366" position="0 0.15 0"></a-cylinder>
                    <a-sphere radius="0.08" segments-width="32" segments-height="32" color="#dcfd8b" position="0 0.3 0"></a-sphere>
                </a-entity>
                <a-entity position="0.56 0.56 0" rotation="0 0 -45">
                    <a-cylinder radius="0.015" height="0.3" color="#003366" position="0 0.15 0"></a-cylinder>
                    <a-sphere radius="0.08" color="#dcfd8b" position="0 0.3 0"></a-sphere>
                </a-entity>
                <a-entity position="-0.56 0.56 0" rotation="0 0 45">
                    <a-cylinder radius="0.015" height="0.3" color="#003366" position="0 0.15 0"></a-cylinder>
                    <a-sphere radius="0.08" color="#dcfd8b" position="0 0.3 0"></a-sphere>
                </a-entity>


                <a-entity position="1.1 1.1 0">
                    <a-cylinder radius="0.005" height="0.8" color="#003366" position="-0.3 -0.3 0" rotation="0 0 -45"></a-cylinder>
                    <a-text value="Receptores VEGFR-1/2\n(Efecto Esponja)" color="#003366" align="center" 
                            position="0 0.15 0" scale="0.45 0.45 0.45" side="double" font="kelsonsans" baseline="bottom" font-weight="bold"></a-text>
                </a-entity>

                <a-entity position="-1.5 0 0">
                    <a-cylinder radius="0.005" height="0.7" color="#003366" position="0.35 0 0" rotation="0 0 90"></a-cylinder>
                    <a-text value="Bicapa Lipidica PEG\n(Filtro de 150 nm)" color="#003366" align="center" 
                            position="-0.1 0.15 0" scale="0.45 0.45 0.45" side="double" font="kelsonsans" baseline="bottom" font-weight="bold"></a-text>
                </a-entity>

                <a-entity position="1.1 -1.1 0">
                    <a-cylinder radius="0.005" height="1.4" color="#003366" position="-0.5 0.5 0" rotation="0 0 45"></a-cylinder>
                    <a-text value="Sistema CRISPR-Cas13\n(Silenciamiento FLT1)" color="#003366" align="center" 
                            position="0 -0.15 0" scale="0.45 0.45 0.45" side="double" font="kelsonsans" baseline="top" font-weight="bold"></a-text>
                </a-entity>

            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
