<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Placenta Shield - WebAR Experiencia</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0px; overflow: hidden; font-family: sans-serif;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            
            <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
                
                <a-sphere radius="0.7" color="#003366" opacity="0.4" material="transparent: true; roughness: 0.2;"></a-sphere>
                <a-sphere radius="0.69" color="#005088" opacity="0.15" material="transparent: true; wireframe: true;"></a-sphere>
                
                <a-torus-knot radius="0.18" tube="0.05" p="2" q="3" color="#800080" material="roughness: 0.6;"></a-torus-knot>
                <a-sphere radius="0.12" color="#a855f7" opacity="0.6" position="0.05 0.05 0"></a-sphere>
                
                <a-entity position="0 0.7 0" rotation="0 0 0">
                    <a-cylinder radius="0.015" height="0.15" color="#64748b" position="0 0.075 0"></a-cylinder>
                    <a-sphere radius="0.05" color="#dcfd8b" position="0 0.15 0"></a-sphere>
                </a-entity>
                <a-entity position="0 -0.7 0" rotation="0 0 180">
                    <a-cylinder radius="0.015" height="0.15" color="#64748b" position="0 0.075 0"></a-cylinder>
                    <a-sphere radius="0.05" color="#dcfd8b" position="0 0.15 0"></a-sphere>
                </a-entity>
                <a-entity position="0.7 0 0" rotation="0 0 -90">
                    <a-cylinder radius="0.015" height="0.15" color="#64748b" position="0 0.075 0"></a-chemistry>
                    <a-sphere radius="0.05" color="#dcfd8b" position="0 0.15 0"></a-sphere>
                </a-entity>
                <a-entity position="-0.7 0 0" rotation="0 0 90">
                    <a-cylinder radius="0.015" height="0.15" color="#64748b" position="0 0.075 0"></a-cylinder>
                    <a-sphere radius="0.05" color="#dcfd8b" position="0 0.15 0"></a-sphere>
                </a-entity>
                <a-entity position="0.5 0.5 0" rotation="0 0 -45">
                    <a-cylinder radius="0.015" height="0.15" color="#64748b" position="0 0.075 0"></a-cylinder>
                    <a-sphere radius="0.05" color="#dcfd8b" position="0 0.15 0"></a-sphere>
                </a-entity>
                <a-entity position="-0.5 0.5 0" rotation="0 0 45">
                    <a-cylinder radius="0.015" height="0.15" color="#64748b" position="0 0.075 0"></a-cylinder>
                    <a-sphere radius="0.05" color="#dcfd8b" position="0 0.15 0"></a-sphere>
                </a-entity>
                <a-entity position="0.5 -0.5 0" rotation="0 0 -135">
                    <a-cylinder radius="0.015" height="0.15" color="#64748b" position="0 0.075 0"></a-cylinder>
                    <a-sphere radius="0.05" color="#dcfd8b" position="0 0.15 0"></a-sphere>
                </a-entity>
                <a-entity position="-0.5 -0.5 0" rotation="0 0 135">
                    <a-cylinder radius="0.015" height="0.15" color="#64748b" position="0 0.075 0"></a-cylinder>
                    <a-sphere radius="0.05" color="#dcfd8b" position="0 0.15 0"></a-sphere>
                </a-entity>

            </a-entity>
            
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
